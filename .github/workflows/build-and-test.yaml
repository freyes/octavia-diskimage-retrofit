name: Build and Test

on:
  pull_request:
    branches:
      - '**'

jobs:
  build-snap:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build the snap
        id: snapcraft
        uses: snapcore/action-build@v1
      - name: Upload built snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-snap
          path: ${{ steps.snapcraft.outputs.snap }}

  test-snap:
    needs: build-snap
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            image_release: noble
            image_url: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img
          - os: ubuntu-24.04
            image_release: noble
            image_url: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img
          - os: ubuntu-20.04
            image_release: jammy
            image_url: https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-amd64.img
          - os: ubuntu-22.04
            image_release: jammy
            image_url: https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-amd64.img
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download built snap artifact
        uses: actions/download-artifact@v4
        with:
          name: built-snap
          path: /tmp/built-snap
      - name: Install the snap
        run: |
          sudo snap install --dangerous --classic /tmp/built-snap/*.snap
      - name: Get the Ubuntu ${{ matrix.image_release }} image
        run: |
          sudo wget --continue -O /var/snap/octavia-diskimage-retrofit/common/tmp/${{ matrix.image_release }}.img \
              ${{ matrix.image_url }}
      - name: Retrofitting ${{ matrix.image_release }} image
        run: |
          cd /var/snap/octavia-diskimage-retrofit/common/tmp
          octavia-diskimage-retrofit -d ${{ matrix.image_release }}.img ${{ matrix.image_release }}-amphora.qcow2

      - name: Test if the image can be booted
        run: |
          set -x
          qemu-system-x86_64 \
              -m 2G \
              -drive file=/var/snap/octavia-diskimage-retrofit/common/tmp/${{ matrix.image_release }}-amphora.qcow2,format=qcow2 \
              -nographic \
              -serial mon:stdio,logfile=serial.log \
              -display none \
              -device virtio-net-pci,netdev=net0 \
              -netdev user,id=net0,hostfwd=tcp::2222-:22 \
              -accel kvm &

          timeout 300 bash -c 'until nc -z localhost 2222; do echo -n .; sleep 5; done'

          tail -n 5 serial.log
          grep "login:" serial.log

      - name: Upload serial log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serial-log-${{ matrix.os }}-${{ matrix.image_release }}
          path: serial.log
          if-no-files-found: ignore
